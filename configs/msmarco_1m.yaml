# Main-tier run: Cohere MSMARCO v2.1, 1M raw passages (1024-d, unit-normalized),
# 10K held-out pseudo-queries. Build the dir first:
#   python scripts/prep_msmarco_bench.py --n 1000000 --queries 10000 \
#       --out /mnt/e/Documents/OMSCS/07_2026_Spring/CS6999/SAQ/data/datasets/msmarco_1m
dataset:
  name: msmarco_1m
  base_fvecs: /mnt/e/Documents/OMSCS/07_2026_Spring/CS6999/SAQ/data/datasets/msmarco_1m/base.fvecs
  query_fvecs: /mnt/e/Documents/OMSCS/07_2026_Spring/CS6999/SAQ/data/datasets/msmarco_1m/query.fvecs
  n_queries: 10000
# Focused set for the confirmation: the divergence (saq_paper vs ours), the fix
# (rankaware, perdim_mse), + key baselines. opq omitted (slow at high M; add at low bpd separately).
methods: [pq, sq, rabitq, saq_paper, ours, perdim_mse, rankaware]
bpd: [1, 2, 3, 4, 5, 6]
ks: [1, 10, 100]
chunk_size: 50000
mse_sample: 100000
output_dir: results/msmarco_1m
